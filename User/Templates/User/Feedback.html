{% extends 'User/Header.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Translator</title>
    <style>
   
        .maincont {
            margin-top: 10px;
            display: flex;
            align-items: center;
        }

        /* ── Feedback card ── */
        .feedback-card {
            max-width: 520px;
            margin: auto;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,.13);
            background: #0f172a;
        }

        /* Header */
        .header-section {
            background: linear-gradient(130deg, #0f172a 0%, #1e1b4b 100%);
            padding: 2rem 1.75rem 1.75rem;
            text-align: center;
            position: relative;
            border-bottom: 1px solid #334155;
        }
        .header-section::after {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(99,102,241,.18), transparent 70%);
            pointer-events: none;
        }
        .header-section h2 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: .3rem;
        }
        .header-section h2 span {
            background: linear-gradient(90deg, #6366f1, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-section p {
            color: #94a3b8;
            font-size: .88rem;
            margin: 0;
        }

        /* Body */
        .card-body {
            background: #1e293b;
            padding: 2rem 1.75rem !important;
        }

        .form-label {
            font-size: .78rem;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: .55rem;
        }

        .form-control {
            background: rgba(255,255,255,.04);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1rem 1.1rem;
            resize: none;
            color: #e2e8f0;
            font-size: .9rem;
            font-family: 'Poppins', sans-serif;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control::placeholder { color: #475569; }
        .form-control:focus {
            background: rgba(255,255,255,.06);
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,.18);
            color: #e2e8f0;
        }

        .btn-submit {
            width: 100%;
            display: flex; align-items: center; justify-content: center; gap: .6rem;
            background: linear-gradient(90deg, #6366f1, #38bdf8);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: .85rem;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: .92rem;
            letter-spacing: .02em;
            transition: opacity .2s, transform .15s, box-shadow .2s;
            cursor: pointer;
        }
        .btn-submit:hover {
            opacity: .88;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(99,102,241,.35);
            color: #fff;
        }
        .btn-submit:active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="maincont">
    <div class="container">
        <div class="card feedback-card">

            <div class="header-section">
                <h2>Your <span>Feedback</span></h2>
                <p>We value your thoughts — help us improve.</p>
            </div>

            <div class="card-body">
                <form action="" method="post">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="txt_feedback" class="form-label">How can we improve?</label>
                        <textarea
                            name="txt_feedback"
                            id="txt_feedback"
                            class="form-control"
                            rows="5"
                            placeholder="Write your feedback here…"
                            required></textarea>
                    </div>

                    <button type="submit" class="btn btn-submit">
                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
                          <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11z"/>
                        </svg>
                        Submit Feedback
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock content %}
