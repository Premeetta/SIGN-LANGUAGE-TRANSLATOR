{% extends 'User/Header.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
</head>
<style>
/* 🌙 Background */
body {
    background: linear-gradient(135deg, #0f172a, #020617);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #e2e8f0;
}

/* 📦 Form container */
table {
    margin: 80px auto;
    border-collapse: collapse;
    background: rgba(30, 41, 59, 0.9);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    overflow: hidden;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    width: 500px;
}

/* 🧱 Cells */
td {
    padding: 12px 15px;
}

/* 🔤 Labels */
td:first-child {
    color: #94a3b8;
    font-weight: 500;
    width: 40%;
}

/* ✏️ Inputs */
input[type="text"] {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #1e293b;
    color: white;
    transition: 0.2s;
}

/* Focus effect */
input[type="text"]:focus {
    border: 1px solid #6366f1;
    box-shadow: 0 0 8px rgba(99,102,241,0.5);
}

/* 🔘 Button */
input[type="submit"] {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

/* Hover */
input[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(99,102,241,0.4);
}
</style>
<body>
    <form action="" method="post">
        {% csrf_token %}
        <table border="3">
            <tr>
                <td>Name</td>
                <td><input type="text" name="txt_name" id="" value="{{data.user_name}}"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="text" name="mail" id="" value="{{data.user_email}}"></td>
            </tr>
            <tr>
                <td>Contact</td>
                <td><input type="text" name="txt_contact" id="" value="{{data.user_contact}}"></td>
            </tr> 
            <tr>
                <td>Address</td>
                <td><input type="text" name="txt_address" id="" value="{{data.user_address}}"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Update"></td>
            </tr>
        </table>
        {% if msg %}
        <script>
            alert("{{msg}}")
            window.location = "{% url 'DeafUser:MyProfile' %}"
        </script>
        {% endif %}
</form></body>
</html>
{% endblock content %}
