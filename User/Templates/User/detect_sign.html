{% extends 'User/Header.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>Sign Language Translator</title>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            font-family: Arial;
            color: white;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            margin: 100px auto;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        input[type="file"] {
            margin: 10px;
            color: white;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #6366f1;
            color: white;
            cursor: pointer;
        }

        h2 {
            margin-top: 20px;
            color: #22c55e;
        }
    </style>

</head>
<body>

<div class="card">
    <h1>Upload Sign Image</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="image" required>
        <br>
        <button type="submit">Detect</button>
    </form>

    {% if result %}
        <h2>Detected: {{ result }}</h2>
    {% endif %}
</div>

</body>
</html>
{% endblock content %}
