<style>
.chat-box {
    max-width: 700px;
    margin: 20px auto;
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    height: 400px;
    overflow-y: auto;
}
.msg {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    max-width: 70%;
}
.sent {
    background: #6366f1;
    color: white;
    margin-left: auto;
}
.received {
    background: #334155;
    color: white;
}
</style>

<div class="chat-box" id="chatBox"></div>

<form id="chatForm" style="max-width:700px;margin:auto;">
    {% csrf_token %}
    <div class="input-group mt-2">
        <input type="text" id="msgInput" class="form-control" placeholder="Type message..." required>
        <button class="btn btn-success">Send</button>
    </div>
</form>

<script>
function loadMessages() {
    fetch("{% url 'DeafUser:get_messages_deaf' user.id %}")
    .then(res => res.json())
    .then(data => {
        let chatBox = document.getElementById("chatBox");
        chatBox.innerHTML = "";

        data.forEach(msg => {
            let div = document.createElement("div");
            div.classList.add("msg");

            if (msg.type === "sent") div.classList.add("sent");
            else div.classList.add("received");

            div.innerText = msg.msg;
            chatBox.appendChild(div);
        });

        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

loadMessages();
setInterval(loadMessages, 2000);

document.getElementById("chatForm").addEventListener("submit", function(e){
    e.preventDefault();

    let msg = document.getElementById("msgInput").value;

    fetch("", {
        method: "POST",
        headers: {
            "X-CSRFToken": "{{ csrf_token }}",
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "msg=" + msg
    }).then(() => {
        document.getElementById("msgInput").value = "";
        loadMessages();
    });
});
</script>
