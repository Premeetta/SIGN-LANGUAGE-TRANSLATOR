{% extends 'DeafUser/Header.html' %}
{% load static %}
{% block content %}
<style>
    /* 🌙 Page background */
    body {
        background: linear-gradient(135deg, #0f172a, #020617);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* 📦 Chat container */
    .dddddddd {
        max-width: 90%;
        width: 100%;
        margin: 20px auto;
        background: rgba(30, 41, 59, 0.9);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 20px;
        height: 400px;
        overflow-y: auto;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* 💬 Messages */
    .msg {
        padding: 12px 14px;
        margin: 8px 0;
        border-radius: 15px;
        max-width: 70%;
        font-size: 14px;
        line-height: 1.4;
        word-wrap: break-word;
        transition: 0.2s ease;
    }

    /* 📤 Sent */
    .sent {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
        margin-left: auto;
        border-bottom-right-radius: 5px;
    }

    /* 📥 Received */
    .received {
        background: #334155;
        color: #e2e8f0;
        border-bottom-left-radius: 5px;
    }

    /* 🎥 Video styling */
    #video {
        display: block;
        margin: 20px auto;
        width: 700px;
        border-radius: 15px;
        border: 2px solid #6366f1;
        box-shadow: 0 5px 20px rgba(99, 102, 241, 0.3);
    }

    /* 🔘 Buttons */
    button {
        display: block;
        margin: 10px auto;
        padding: 10px 18px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s ease;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4);
    }

    /* 📝 Input box */
    #chatForm {
        max-width: 800px;
        margin: 10px auto;
    }

    #msgInput {
        border-radius: 10px 0 0 10px;
        border: none;
        padding: 10px;
        background: #1e293b;
        color: white;
        height: 50px;
        margin-top: 10px;
    }

    #msgInput::placeholder {
        color: #94a3b8;
    }

    /* Send button */
    .btn-success {
        border-radius: 0 10px 10px 0;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        border: none;
        height: 50px;
    }

    .btn-success:hover {
        background: linear-gradient(135deg, #4f46e5, #4338ca);
    }

    /* 📜 Scrollbar */
    .dddddddd::-webkit-scrollbar {
        width: 6px;
    }

    .dddddddd::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 10px;
    }

    /* 🧩 Main layout split */
    .main-container {
        display: flex;
        gap: 20px;
        max-width: 1200px;
        margin: 20px auto;
        align-items: flex-start;
    }

    /* 🎥 Left side (camera) */
    .left-panel {
        flex: 1;
        text-align: center;
    }

    /* 💬 Right side (chat) */
    .right-panel {
        flex: 1.5;
    }

    /* Make video responsive */
    #video {
        width: 100%;
        max-width: 320px;
    }

    .dddddddd::-webkit-scrollbar-thumb:hover {
        background: #64748b;
    }
</style>
<div class="main-container" style="width: 100%;">

    <!-- 🎥 LEFT SIDE -->
    <div class="left-panel">
        <video id="video" autoplay></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <button onclick="startCamera()">Start Camera</button>
    </div>

    <!-- 💬 RIGHT SIDE -->
    <div class="right-panel">
        <div class="dddddddd" id="chatBox"></div>
        <form id="chatForm">
            {% csrf_token %}
            <div class="input-group mt-2">
                <input type="text" id="msgInput" class="form-control" placeholder="Type message..." required>
                <button class="btn btn-success">Send</button>
            </div>
        </form>
    </div>
</div>
<script>
    // 🔥 Dynamic IDs
    const userId = "{{ user.id }}";
    const deafId = "{{ duid }}";
    const video = document.getElementById("video");

    // 🔄 Load Messages
    function loadMessages() {
        fetch("{% url 'DeafUser:get_messages_deaf' user.id %}")
            .then(res => res.json())
            .then(data => {
                let chatBox = document.getElementById("chatBox");
                chatBox.innerHTML = "";

                data.forEach(msg => {
                    let div = document.createElement("div");
                    div.classList.add("msg");

                    if (msg.type === "sent") div.classList.add("sent");
                    else div.classList.add("received");

                    div.innerText = msg.msg;
                    chatBox.appendChild(div);
                });

                chatBox.scrollTop = chatBox.scrollHeight;
            });
    }

    loadMessages();
    setInterval(loadMessages, 2000);

    // ✉️ SEND FUNCTION
    function sendMessage(msg) {
        if (!msg.trim()) return;

        fetch("{% url 'DeafUser:sign_message' user.id %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                msg: msg,
                deaf_id: deafId
            })
        }).then(() => {
            loadMessages();
        });
    }

    // ✉️ Manual Send
    document.getElementById("chatForm").addEventListener("submit", function (e) {
        e.preventDefault();

        let msg = document.getElementById("msgInput").value;

        sendMessage(msg);
        document.getElementById("msgInput").value = "";
    });

    // 📸 AUTO CAPTURE FUNCTION
    let lastWord = "";

    function captureFrame() {
        let canvas = document.getElementById("canvas");
        let ctx = canvas.getContext("2d");

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0);

        let imageData = canvas.toDataURL("image/jpeg");

        fetch("{% url 'DeafUser:detect_sign' user.id %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                image: imageData,
                deaf_id: deafId
            })
        })
            .then(res => res.json())
            .then(data => {

                // 🔥 Only update if stable detection exists
                if (data.text) {

                    if (data.text !== "SPACE") {
                        document.getElementById("msgInput").value = data.current_word;
                    }

                    // 🔥 Send when SPACE detected
                    if (data.text === "SPACE" && data.current_word === "") {
                        if (lastWord !== "") {
                            sendMessage(lastWord);
                            lastWord = "";
                        }
                    } else {
                        lastWord = data.current_word;
                    }
                }
            });
    }

    // 🔥 AUTO RUN EVERY 500ms
    setInterval(() => {
        if (video.srcObject) {
            captureFrame();
        }
    }, 500);

    // 🎥 Start Camera
    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.log("Camera error:", err);
            });
    }
</script>
{% endblock content %}
