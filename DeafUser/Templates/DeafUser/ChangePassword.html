{% extends 'DeafUser/Header.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Translator</title>
</head>
<style>
/* 🌙 Background */
body {
    background: linear-gradient(135deg, #0f172a, #020617);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #e2e8f0;
}

/* 📦 Form container */
table {
    width: 700px;
    margin: 80px auto;
    border-collapse: collapse;
    background: rgba(51, 67, 92, 0.9);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* 🧱 Cells */
td {
    padding: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* 🔤 Labels */
td:first-child {
    color: #94a3b8;
    font-size: 14px;
}

/* ✏️ Input fields */
input[type="password"] {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #1e293b;
    color: white;
    outline: none;
}

/* Focus effect */
input[type="password"]:focus {
    border: 1px solid #6366f1;
}

/* 🔘 Buttons */
input[type="submit"] {
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    margin-right: 10px;
    transition: 0.2s;
}

/* Change button */
input[type="submit"]:first-child {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
}

/* Cancel button */
input[type="submit"]:last-child {
    background: #475569;
    color: white;
}

/* Hover */
input[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Center buttons */
tr:last-child td {
    text-align: center;
}
</style>
<body>
    <form action="" method="post">
        {% csrf_token %}
        <table border="3">
            <tr>
                <td>Old Password</td>
                <td><input type="password" name="old_pass" id="" ></td>
            </tr>

            <tr>
                <td>New password</td>
                <td><input type="password" name="new_pass" id=""></td>
            </tr>

            <tr>
                <td>Re-Type password</td>
                <td><input type="password" name="re_pass" id=""></td>
            </tr> 

            <tr>
                <td ><input type="submit" value="Change password"> 
               <input type="submit" value="Cancel"></td>
            </tr>
            </table>
    
</body>
</html>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'DeafUser:MyProfile' %}"
</script>

{% endif %}
{% endblock %}
