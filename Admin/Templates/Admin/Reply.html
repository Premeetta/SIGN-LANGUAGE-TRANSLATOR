{% extends 'Admin/Header.html' %}
{% block content %}

<style>
  :root {
    --blue:   #6366f1;
    --sky:    #38bdf8;
    --dark:   #0f172a;
    --card:   #1e293b;
    --muted:  #94a3b8;
    --border: #334155;
    --grad:   linear-gradient(90deg, #6366f1, #38bdf8);
  }

  .rp-wrap {
    padding: 2rem 1.75rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Page heading */
  .rp-page-head {
    width: 100%;
    max-width: 560px;
    margin-bottom: 1.75rem;
  }
  .rp-page-head h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.75rem;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }
  .rp-page-head h1 span {
    background: var(--grad);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .rp-page-head p {
    color: var(--muted);
    font-size: .85rem;
    margin-top: .4rem;
  }

  /* Card */
  .rp-card {
    width: 100%;
    max-width: 560px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }
  .rp-card::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(99,102,241,.08), transparent 70%);
    pointer-events: none;
  }

  .rp-card-header {
    padding: 1.1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: .6rem;
    font-family: 'Syne', sans-serif;
    font-size: .88rem;
    font-weight: 700;
    color: #fff;
  }
  .rp-card-header i { color: var(--sky); }

  .rp-card-body { padding: 1.75rem 1.5rem; }

  /* Input group */
  .rp-field { margin-bottom: 1.25rem; }
  .rp-label {
    display: block;
    font-size: .75rem;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: .55rem;
  }

  .rp-input-wrap { position: relative; }
  .rp-input-wrap i {
    position: absolute;
    left: 1rem; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: .95rem;
    pointer-events: none;
    transition: color .2s;
  }
  .rp-input {
    width: 100%;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .8rem 1rem .8rem 2.75rem;
    color: #e2e8f0;
    font-size: .88rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .rp-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }
  .rp-input:focus + i,
  .rp-input-wrap:focus-within i { color: var(--sky); }
  /* icon after input — reorder in DOM so sibling selector works */
  .rp-input-wrap .field-icon {
    position: absolute;
    left: 1rem; top: 50%;
    transform: translateY(-50%);
  }

  /* Submit btn */
  .rp-submit {
    width: 100%;
    display: flex; align-items: center; justify-content: center; gap: .6rem;
    background: var(--grad);
    border: none; cursor: pointer;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: .9rem;
    padding: .9rem 1.5rem;
    border-radius: 10px;
    transition: opacity .2s, transform .15s, box-shadow .2s;
    margin-top: .25rem;
  }
  .rp-submit:hover {
    opacity: .88;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(99,102,241,.35);
  }
  .rp-submit:active { transform: translateY(0); }
  .rp-submit i { font-size: .9rem; }

  /* Back link */
  .rp-back {
    display: inline-flex; align-items: center; gap: .45rem;
    color: var(--muted); font-size: .82rem; text-decoration: none;
    margin-top: 1.25rem;
    transition: color .2s;
  }
  .rp-back:hover { color: var(--sky); }
</style>

<div class="rp-wrap">

  <div class="rp-page-head">
    <h1>Send a <span>Reply</span></h1>
    <p>Compose your response to the user's complaint.</p>
  </div>

  <div class="rp-card">
    <div class="rp-card-header">
      <i class="bi bi-reply-fill"></i> Reply to Complaint
    </div>
    <div class="rp-card-body">
      <form action="" method="post">
        {% csrf_token %}

        <div class="rp-field">
          <label class="rp-label" for="reply_txt">Your Reply</label>
          <div class="rp-input-wrap">
            <i class="bi bi-chat-text field-icon"></i>
            <input
              class="rp-input"
              type="text"
              name="reply_txt"
              id="reply_txt"
              placeholder="Type your reply here…"
              required
              autocomplete="off"
            >
          </div>
        </div>

        <button type="submit" class="rp-submit">
          <i class="bi bi-send-fill"></i> Send Reply
        </button>
      </form>
    </div>
  </div>

  <a href="{% url 'Admin:ViewComplaint' %}" class="rp-back">
    <i class="bi bi-arrow-left"></i> Back to Complaints
  </a>

</div>

{% if msg %}
<script>
  alert("{{ msg }}")
  window.location = "{% url 'Admin:ViewComplaint' %}"
</script>
{% endif %}

{% endblock %}
