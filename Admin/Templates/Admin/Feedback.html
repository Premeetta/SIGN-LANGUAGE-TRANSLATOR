{% extends 'Admin/Header.html' %}
{% block content %}

<style>
/* 📦 Page spacing */
.container {
    padding: 20px;
}

/* 📊 Table */
table {
    width: 95%;
    margin: 20px auto;
    border-collapse: collapse;
    background: rgba(30, 41, 59, 0.9);
    border-radius: 15px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* Header row */
table tr:first-child {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    font-weight: bold;
}

/* Cells */
td {
    padding: 12px;
    text-align: center;
    color: #e2e8f0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* Alternate rows */
tr:nth-child(even) {
    background: rgba(255,255,255,0.02);
}

/* Hover */
tr:hover {
    background: rgba(34,197,94,0.1);
    transition: 0.2s ease;
}

/* Title */
h2 {
    text-align: center;
    margin-top: 20px;
    color: #38bdf8;
}

/* 📱 Responsive */
@media (max-width: 768px) {
    table {
        font-size: 12px;
    }
}
</style>

<div class="container">
    <h2> User Feedback</h2>

    <table>
        <tr>
            <td>SL NO</td>
            <td>Feedback</td>
            <td>User</td>
        </tr>

        {% for i in data %}
        <tr>
            <td>{{forloop.counter}}</td>
            <td>{{i.feedback_content}}</td>
            <td>{{i.user_id.user_name}}</td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
